apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: kafka-delay
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    labelSelectors:
      app: order-service
  externalTargets:
    - 10.43.246.98 # IP Kafka của ông
  delay:
    latency: '1000ms'
    jitter: '200ms'
  duration: '5m'