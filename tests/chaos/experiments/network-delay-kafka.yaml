apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: order-service-kafka-delay
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - default
    labelSelectors:
      app: order-service
  externalTargets:
    - kafka-svc.kafka.svc.cluster.local
  delay:
    latency: "1000ms"
    jitter: "200ms"
  duration: "5m"
