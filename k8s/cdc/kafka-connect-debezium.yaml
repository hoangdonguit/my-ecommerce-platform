apiVersion: v1
kind: Namespace
metadata:
  name: cdc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect-debezium
  namespace: cdc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-connect-debezium
  template:
    metadata:
      labels:
        app: kafka-connect-debezium
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm3-gitops
      containers:
        - name: kafka-connect
          image: hoangdonguit/kafka-connect-debezium:dynamic-filter-redis-20260601022704
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka-svc.kafka.svc.cluster.local:9092
            - name: GROUP_ID
              value: debezium-connect-cluster
            - name: CONFIG_STORAGE_TOPIC
              value: debezium_connect_configs
            - name: OFFSET_STORAGE_TOPIC
              value: debezium_connect_offsets
            - name: STATUS_STORAGE_TOPIC
              value: debezium_connect_statuses
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: kafka-connect-debezium
            - name: CONNECT_PLUGIN_PATH
              value: /kafka/connect,/debezium-connector-postgres
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect-debezium
  namespace: cdc
spec:
  type: ClusterIP
  selector:
    app: kafka-connect-debezium
  ports:
    - name: http
      port: 8083
      targetPort: 8083
