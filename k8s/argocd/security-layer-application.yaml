apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-layer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hoangdonguit/my-ecommerce-platform
    targetRevision: main
    path: k8s/security
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
