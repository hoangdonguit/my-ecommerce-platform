apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hoangdonguit/my-ecommerce-platform
    targetRevision: main
    path: k8s/services
    directory:
      recurse: false
      exclude: '*example*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: order-service
      namespace: default
      jsonPointers:
        - /spec/replicas
  - group: apps
    kind: Deployment
    name: inventory-api
    namespace: default
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: Deployment
    name: inventory-consumer
    namespace: default
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: Deployment
    name: payment-api
    namespace: default
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: Deployment
    name: payment-consumer
    namespace: default
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: Deployment
    name: notification-api
    namespace: default
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: Deployment
    name: notification-consumer
    namespace: default
    jsonPointers:
    - /spec/replicas

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
