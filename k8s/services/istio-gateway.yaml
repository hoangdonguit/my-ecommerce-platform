apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: ecommerce-gateway
  namespace: default
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: web-gateway-vs
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - ecommerce-gateway
  http:
  - match:
    - uri:
        prefix: /kafdrop
    rewrite:
      uri: /
    route:
    - destination:
        host: kafdrop.kafka.svc.cluster.local
        port:
          number: 9000
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: web-gateway
        port:
          number: 8090
