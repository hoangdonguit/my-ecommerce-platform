apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-gateway
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-gateway
  template:
    metadata:
      labels:
        app: web-gateway
        sidecar.istio.io/inject: 'true'
      annotations:
        sidecar.istio.io/inject: 'true'
        traffic.sidecar.istio.io/excludeOutboundPorts: 5432,6379,9092,27017,4317,4318
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm1-gateway
      serviceAccountName: web-gateway-sa
      containers:
      - name: web-gateway
        image: hoangdonguit/web-gateway:otel-webgateway-20260601213658
        ports:
        - containerPort: 8090
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        env:
        - name: APP_NAME
          value: web-gateway
        - name: APP_PORT
          value: '8090'
        - name: APP_ENV
          value: development
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: ORDER_SERVICE_URL
        - name: INVENTORY_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: INVENTORY_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: PAYMENT_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: NOTIFICATION_SERVICE_URL
        - name: READ_MODEL_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: READ_MODEL_SERVICE_URL
        - name: WEB_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: WEB_GATEWAY_API_KEY
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: REDIS_ADDR
        - name: OTEL_ENABLED
          value: 'true'
        - name: OTEL_SERVICE_NAME
          value: web-gateway
        - name: OTEL_ENVIRONMENT
          value: development
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.observability.svc.cluster.local:4317
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /api/health
            port: 8090
          timeoutSeconds: 3
          periodSeconds: 3
          failureThreshold: 40
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8090
          timeoutSeconds: 3
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8090
          timeoutSeconds: 3
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: web-gateway
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: web-gateway
  ports:
  - protocol: TCP
    port: 8090
    targetPort: 8090
    name: http
    appProtocol: http
