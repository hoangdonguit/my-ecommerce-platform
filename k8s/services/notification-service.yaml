apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
      - name: notification-api
        image: hoangdonguit/notification-service:latest
        command: ["/app/notification-api"]
        ports:
        - containerPort: 8084
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "notification-service"
        - name: APP_PORT
          value: "8084"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: NOTIFICATION_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-consumer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-consumer
  template:
    metadata:
      labels:
        app: notification-consumer
    spec:
      containers:
      - name: notification-consumer
        image: hoangdonguit/notification-service:latest
        command: ["/app/notification-consumer"]
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "notification-service"
        - name: APP_PORT
          value: "8084"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: NOTIFICATION_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER

---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: default
spec:
  selector:
    app: notification-api
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
