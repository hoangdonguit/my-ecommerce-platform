apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
        sidecar.istio.io/inject: 'true'
        security-tier: internal-api
      annotations:
        sidecar.istio.io/inject: 'true'
        traffic.sidecar.istio.io/excludeOutboundPorts: 5432,6379,9092,27017,4317,4318
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - vm1-gateway
                - vm2-mesh
      serviceAccountName: notification-api-sa
      containers:
      - name: notification-api
        image: hoangdonguit/notification-service:otel-full-saga-20260603005334
        command:
        - /app/notification-api
        ports:
        - containerPort: 8084
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        env:
        - name: APP_NAME
          value: notification-service
        - name: APP_PORT
          value: '8084'
        - name: APP_ENV
          value: development
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: NOTIFICATION_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: notification-service-group
        - name: KAFKA_TOPIC_PAYMENT_COMPLETED
          value: payment.completed
        - name: KAFKA_TOPIC_PAYMENT_FAILED
          value: payment.failed
        - name: OTEL_ENABLED
          value: 'true'
        - name: OTEL_SERVICE_NAME
          value: notification-service
        - name: OTEL_ENVIRONMENT
          value: development
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.observability.svc.cluster.local:4317
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: 8084
          timeoutSeconds: 3
          periodSeconds: 3
          failureThreshold: 40
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8084
          timeoutSeconds: 3
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8084
          timeoutSeconds: 3
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
