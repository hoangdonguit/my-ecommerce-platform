---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: default
spec:
  selector:
    app: notification-api
  ports:
  - protocol: TCP
    port: 8084
    targetPort: 8084
    name: http
    appProtocol: http
