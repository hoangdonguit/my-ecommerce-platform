apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
      - name: notification-api
        image: hoangdonguit/notification-service:latest
        command: ["/app/notification-api"]
        ports:
        - containerPort: 8084
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "notification-service"
        - name: APP_PORT
          value: "8084"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          value: "postgres://postgres:securepassword@10.43.190.247:5432/notification_db?sslmode=disable"
        - name: KAFKA_BROKER
          value: "10.43.246.98:9092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-consumer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-consumer
  template:
    metadata:
      labels:
        app: notification-consumer
    spec:
      containers:
      - name: notification-consumer
        image: hoangdonguit/notification-service:latest
        command: ["/app/notification-consumer"]
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "notification-service"
        - name: APP_PORT
          value: "8084"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          value: "postgres://postgres:securepassword@10.43.190.247:5432/notification_db?sslmode=disable"
        - name: KAFKA_BROKER
          value: "10.43.246.98:9092"