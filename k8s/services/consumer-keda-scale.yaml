apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inventory-consumer-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: inventory-consumer
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 8
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka-svc.kafka.svc.cluster.local:9092
      consumerGroup: inventory-service-group
      topic: order.created
      lagThreshold: "20"
      activationLagThreshold: "1"
      offsetResetPolicy: latest
      allowIdleConsumers: "false"
      scaleToZeroOnInvalidOffset: "false"
      excludePersistentLag: "false"
      limitToPartitionsWithLag: "false"
      ensureEvenDistributionOfPartitions: "true"

