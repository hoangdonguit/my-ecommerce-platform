apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        sidecar.istio.io/inject: 'true'
        security-tier: internal-api
      annotations:
        sidecar.istio.io/inject: 'true'
        traffic.sidecar.istio.io/excludeOutboundPorts: 5432,6379,9092,27017,4317,4318
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - vm1-gateway
                - vm2-mesh
      serviceAccountName: inventory-api-sa
      containers:
      - name: inventory-api
        image: hoangdonguit/inventory-service:otel-full-saga-inventory-hotfix-20260603013722
        command:
        - /app/inventory-api
        ports:
        - containerPort: 8082
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        env:
        - name: APP_NAME
          value: inventory-service
        - name: APP_PORT
          value: '8082'
        - name: APP_ENV
          value: development
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: INVENTORY_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: inventory-service-group
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: order.created
        - name: KAFKA_TOPIC_INVENTORY_RESERVED
          value: inventory.reserved
        - name: KAFKA_TOPIC_INVENTORY_FAILED
          value: inventory.failed
        - name: OTEL_ENABLED
          value: 'true'
        - name: OTEL_SERVICE_NAME
          value: inventory-service
        - name: OTEL_ENVIRONMENT
          value: development
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.observability.svc.cluster.local:4317
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: 8082
          timeoutSeconds: 3
          periodSeconds: 3
          failureThreshold: 40
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8082
          timeoutSeconds: 3
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8082
          timeoutSeconds: 3
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: default
spec:
  selector:
    app: inventory-api
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
    name: http
    appProtocol: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-consumer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-consumer
  template:
    metadata:
      labels:
        app: inventory-consumer
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - vm1-gateway
                - vm2-mesh
      serviceAccountName: inventory-consumer-sa
      containers:
      - name: inventory-consumer
        image: hoangdonguit/inventory-service:otel-full-saga-inventory-hotfix-20260603013722
        command:
        - /app/inventory-consumer
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        env:
        - name: APP_NAME
          value: inventory-service
        - name: APP_PORT
          value: '8082'
        - name: APP_ENV
          value: development
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: INVENTORY_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: inventory-service-group
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: order.created
        - name: KAFKA_TOPIC_INVENTORY_RESERVED
          value: inventory.reserved
        - name: KAFKA_TOPIC_INVENTORY_FAILED
          value: inventory.failed
        - name: OUTBOX_BATCH_SIZE
          value: '25'
        - name: OUTBOX_IDLE_SLEEP_MS
          value: '500'
        - name: OTEL_ENABLED
          value: 'true'
        - name: OTEL_SERVICE_NAME
          value: inventory-service
        - name: OTEL_ENVIRONMENT
          value: development
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.observability.svc.cluster.local:4317
