apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
      - name: inventory-api
        image: hoangdonguit/inventory-service:latest
        command: ["/app/inventory-api"]
        ports:
        - containerPort: 8082
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "inventory-service"
        - name: APP_PORT
          value: "8082"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: INVENTORY_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: "inventory-service-group"
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: "order.created"
        - name: KAFKA_TOPIC_INVENTORY_RESERVED
          value: "inventory.reserved"
        - name: KAFKA_TOPIC_INVENTORY_FAILED
          value: "inventory.failed"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: default
spec:
  selector:
    app: inventory-api
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-consumer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-consumer
  template:
    metadata:
      labels:
        app: inventory-consumer
    spec:
      containers:
      - name: inventory-consumer
        image: hoangdonguit/inventory-service:latest
        command: ["/app/inventory-consumer"]
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "inventory-service"
        - name: APP_PORT
          value: "8082"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: INVENTORY_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: "inventory-service-group"
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: "order.created"