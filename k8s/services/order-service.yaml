apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      nodeSelector:
        worker: knight3007
      containers:
      - name: order-service
        image: hoangdonguit/order-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: APP_NAME
          value: "order-service"
        - name: APP_PORT
          value: "8081"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          value: "postgres://postgres:securepassword@postgresql.db.svc.cluster.local:5432/order_db?sslmode=disable"
        - name: KAFKA_BROKER
          value: "10.43.238.7:9092"
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: "order.created"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
