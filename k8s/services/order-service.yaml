apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm2-mesh
      serviceAccountName: order-service-sa
      containers:
      - name: order-service
        image: hoangdonguit/order-service:otel-orderservice-20260601232328
        ports:
        - containerPort: 8081
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "order-service"
        - name: APP_PORT
          value: "8081"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: ORDER_DB_URL
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: REDIS_ADDR
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: "order.created"
        - name: ORDER_OUTBOX_BATCH_SIZE
          value: "200"
        - name: ORDER_OUTBOX_INTERVAL_MS
          value: "200"
        - name: ORDER_OUTBOX_STALE_PROCESSING_SECONDS
          value: "60"
        - name: ORDER_OUTBOX_REQUEUE_STALE_PUBLISHED
          value: "true"
        - name: ORDER_OUTBOX_REQUEUE_AFTER_SECONDS
          value: "120"
        - name: ORDER_OUTBOX_REQUEUE_CHECK_MS
          value: "5000"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "order-service"
        - name: OTEL_ENVIRONMENT
          value: "development"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.observability.svc.cluster.local:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
