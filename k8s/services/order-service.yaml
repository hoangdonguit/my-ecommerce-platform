apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        sidecar.istio.io/inject: 'true'
        security-tier: internal-api
      annotations:
        sidecar.istio.io/inject: 'true'
        traffic.sidecar.istio.io/excludeOutboundPorts: 5432,6379,9092,27017,4317,4318
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - vm1-gateway
                - vm2-mesh
      serviceAccountName: order-service-sa
      containers:
      - name: order-service
        image: hoangdonguit/order-service:redis-fallback-hardening-20260606092113
        ports:
        - containerPort: 8081
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        env:
        - name: APP_NAME
          value: order-service
        - name: APP_PORT
          value: '8081'
        - name: APP_ENV
          value: development
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: ORDER_DB_URL
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: REDIS_ADDR
        - name: ENABLE_FLASH_SALE_GATE
          value: "true"
        - name: FLASH_SALE_PRODUCTS
          value: "prod-123"
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_TOPIC_ORDER_CREATED
          value: order.created
        - name: ORDER_OUTBOX_BATCH_SIZE
          value: '200'
        - name: ORDER_OUTBOX_INTERVAL_MS
          value: '200'
        - name: ORDER_OUTBOX_STALE_PROCESSING_SECONDS
          value: '60'
        - name: ORDER_OUTBOX_REQUEUE_STALE_PUBLISHED
          value: 'true'
        - name: ORDER_OUTBOX_REQUEUE_AFTER_SECONDS
          value: '120'
        - name: ORDER_OUTBOX_REQUEUE_CHECK_MS
          value: '5000'
        - name: OTEL_ENABLED
          value: 'true'
        - name: OTEL_SERVICE_NAME
          value: order-service
        - name: OTEL_ENVIRONMENT
          value: development
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.observability.svc.cluster.local:4317
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: 8081
          timeoutSeconds: 3
          periodSeconds: 3
          failureThreshold: 40
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8081
          timeoutSeconds: 3
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8081
          timeoutSeconds: 3
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
spec:
  selector:
    app: order-service
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
    name: http
    appProtocol: http
