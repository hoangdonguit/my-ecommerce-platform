apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm2-mesh
      serviceAccountName: payment-api-sa
      containers:
      - name: payment-api
        image: hoangdonguit/payment-service:otel-full-saga-payment-hotfix-20260603015846
        command: ["/app/payment-api"]
        ports:
        - containerPort: 8083
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "payment-service"
        - name: APP_PORT
          value: "8083"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: PAYMENT_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: "payment-service-group"
        - name: KAFKA_TOPIC_INVENTORY_RESERVED
          value: "inventory.reserved"
        - name: KAFKA_TOPIC_PAYMENT_COMPLETED
          value: "payment.completed"
        - name: KAFKA_TOPIC_PAYMENT_FAILED
          value: "payment.failed"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "payment-service"
        - name: OTEL_ENVIRONMENT
          value: "development"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.observability.svc.cluster.local:4317"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-consumer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-consumer
  template:
    metadata:
      labels:
        app: payment-consumer
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm2-mesh
      serviceAccountName: payment-consumer-sa
      containers:
      - name: payment-consumer
        image: hoangdonguit/payment-service:otel-full-saga-payment-hotfix-20260603015846
        command: ["/app/payment-consumer"]
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: APP_NAME
          value: "payment-service"
        - name: APP_PORT
          value: "8083"
        - name: APP_ENV
          value: "development"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ecommerce-runtime-secrets
              key: PAYMENT_DB_URL
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-runtime-config
              key: KAFKA_BROKER
        - name: KAFKA_GROUP_ID
          value: "payment-service-group"
        - name: KAFKA_TOPIC_INVENTORY_RESERVED
          value: "inventory.reserved"
        - name: KAFKA_TOPIC_PAYMENT_COMPLETED
          value: "payment.completed"
        - name: KAFKA_TOPIC_PAYMENT_FAILED
          value: "payment.failed"
        - name: PAYMENT_OUTBOX_BATCH_SIZE
          value: "200"
        - name: PAYMENT_OUTBOX_IDLE_SLEEP_MS
          value: "200"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "payment-service"
        - name: OTEL_ENVIRONMENT
          value: "development"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.observability.svc.cluster.local:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: default
spec:
  selector:
    app: payment-api
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
