version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: order-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: order-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@order-kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://order-kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - ecommerce-net

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service
    restart: always
    depends_on:
      - postgres
      - kafka
    ports:
      - "8081:8081"
    environment:
      APP_NAME: order-service
      APP_PORT: 8081
      APP_ENV: development
      DB_URL: postgres://postgres:postgres@order-postgres:5432/order_db?sslmode=disable
      KAFKA_BROKER: order-kafka:9092
      KAFKA_TOPIC_ORDER_CREATED: order.created
    networks:
      - ecommerce-net

volumes:
  order_postgres_data:

networks:
  ecommerce-net:
    external: true